<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima • Weather</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <div class="main-container">
        <!-- Header -->
        <header class="header">
            <h1 class="logo">Clima</h1>
            <button id="themeToggle" class="theme-btn">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <!-- Search -->
        <div class="search-container">
            <form id="searchForm">
                <div class="input-wrapper">
                    <input type="text" id="cityInput" class="search-input" 
                           placeholder="Search any city..." autocomplete="off">
                    <button type="submit" class="search-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <ul id="suggestions" class="suggestions-list"></ul>
            </form>
        </div>

        <!-- Current Weather -->
        <div id="currentWeather" class="current-weather"></div>

        <!-- Forecast -->
        <h4 class="forecast-title">5-Day Forecast</h4>
        <div id="forecastContainer" class="forecast-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
